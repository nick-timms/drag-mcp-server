# gitleaks configuration for @dragapp/mcp-server (PUBLIC repo)
#
# Uses gitleaks' built-in secret detection (keys, JWTs, tokens). Repo-specific
# sensitive-term enforcement is deliberately NOT kept in this public file — it
# is handled by the tarball guard (scripts/check-tarball.mjs) and CI, which read
# their term list from a private source that is never published.

title = "DragApp MCP Server leak-prevention config"

[extend]
useDefault = true

# Reduce false positives on files that are safe by construction.
[[allowlists]]
description = "Placeholder env template and lockfile integrity hashes"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)package-lock\.json$''',
]
