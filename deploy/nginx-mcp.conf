# NGINX snippet for app.dragapp.com/mcp → MCP service.
# Drop the `location` blocks into the existing app.dragapp.com server {} block,
# and the `upstream` near your other upstreams. Standard proxy_pass, with ONE
# critical difference: Streamable HTTP responses can be SSE streams, so
# proxy_buffering MUST be off or streamed responses stall behind NGINX.

upstream mcp_backend {
    # The MCP EC2 instance in the VPC (private address + MCP_PORT).
    server 10.0.0.0:3001;
    keepalive 32;
}

server {
    # ... existing app.dragapp.com server block (listen 443 ssl, TLS, etc.) ...

    location /mcp {
        # Trailing slash decides prefix handling; the service accepts BOTH so
        # either is fine:
        #   proxy_pass http://mcp_backend;    → upstream receives  /mcp   (prefix kept)
        #   proxy_pass http://mcp_backend/;   → upstream receives  /      (prefix stripped)
        proxy_pass http://mcp_backend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The user's DragApp token rides in Authorization; pass it through.
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Connection        "";

        # ── SSE / streaming — required ──
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Optional: expose the health check for external load-balancer probes.
    location = /mcp/health {
        proxy_pass http://mcp_backend/health;
        proxy_buffering off;
        access_log off;
    }
}
