name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets + internal-name scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets and internal names
        run: gitleaks git . --config .gitleaks.toml --redact --verbose

      - name: Scan working tree for secrets
        run: gitleaks dir . --config .gitleaks.toml --redact --verbose

      - name: Scan for forbidden terms (private list)
        env:
          FORBIDDEN_TERMS: ${{ secrets.FORBIDDEN_TERMS }}
        run: |
          if [ -z "${FORBIDDEN_TERMS:-}" ]; then
            echo "FORBIDDEN_TERMS secret not set (e.g. a fork) — skipping private-term scan."
            exit 0
          fi
          pattern=$(printf '%s' "$FORBIDDEN_TERMS" | tr ',' '\n' | sed '/^[[:space:]]*$/d' | paste -sd '|' -)
          # Scan tracked files (redact matches so the secret list never prints in logs).
          if git grep -niE "$pattern" -- . >/dev/null 2>&1; then
            count=$(git grep -niE "$pattern" -- . | wc -l | tr -d ' ')
            echo "::error::Found $count occurrence(s) of forbidden term(s) in tracked files."
            # Print file:line only, with the matched term redacted.
            git grep -niE "$pattern" -- . | sed -E "s/($pattern)/[REDACTED]/gi" | cut -d: -f1,2
            exit 1
          fi
          echo "No forbidden terms found in tracked files."
